  bio              : "First-year PhD candidate at HKUST NLP Group"
  location         : "Hong Kong"
  employer         :
  pubmed           : 
  googlescholar    : "https://scholar.google.com/citations?hl=en&user=tbK9jl4AAAAJ&view_op=list_works&sortby=pubdate"
  email            : "jliugi@connect.ust.hk"
  researchgate     :  
  uri              :
  bitbucket        :
  codepen          :
  dribbble         :
  flickr           :
  facebook         :
  foursquare       :
