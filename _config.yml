    - "https://twitter.com/junteng88716710"

# Analytics
analytics:
  provider               : "google-universal" # false (default), "google", "google-universal", "custom"
  google:
    tracking_id          : UA-XXXXXXX-X

# Google Site Verification
# google_site_verification:


# Comments
comments:
  provider               : # false (default), "disqus", "discourse", "facebook", "google-plus", "staticman", "staticman_v2", "utterances"
  disqus:
    shortname            : # https://help.disqus.com/customer/portal/articles/466182-paste-the-disqus-embed-code-to-your-website
  discourse:
    server               : # https://meta.discourse.org/t/embedding-discourse-comments-via-javascript/31963 , e.g.: meta.discourse.org
  facebook:
    # https://developers.facebook.com/docs/plugins/comments
    appid                :
    num_posts            : # 5 (default)
    colorscheme          : # "light" (default), "dark"
  utterances:
    theme                : # "github-light" (default), "github-dark", "preferred-color-scheme", "boxy-light", "icy-dark", "dark-blue", "photon-dark", "body-dark", "gruvbox-dark", "gruvbox-light", "high-contrast"
    issue_term           : # "pathname" (default)

